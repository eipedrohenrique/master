<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

    <div class="login-box" id="loginBox">

        <div class="logo-area">
            <img src="img/logo.png" alt="Logo da Empresa" class="logo-admin">
            <h2>Área Restrita</h2>
            <p>Acesso exclusivo da empresa</p>
        </div>

        <div class="input-group">
            <span class="icon"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" id="email" placeholder="Digite seu email">
        </div>

        <div class="input-group">
            <span class="icon"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="senha" placeholder="Digite sua senha">
        </div>

        <div class="extras-login">
            <label>
                <input type="checkbox"> Lembrar minha senha
            </label>
        </div>

        <button onclick="login()">Entrar</button>

    </div>

    <div class="painel" id="painel" style="display:none;">
        <div class="topo-painel">
            <h1>Denúncias Recebidas</h1>
            <button onclick="logout()">Sair</button>
        </div>

        <div id="listaDenuncias"></div>
    </div>

    <script type="module" src="admin.js"></script>

</body>

</html>
